<style>

body {
  animation: rotate-bg-color 10s infinite;
}

@keyframes rotate-bg-color {
  0% {
    background-color: #007bff;
  }
  10% {
    background-color: #ff2600;
  }
  20% {
    background-color: #ffdf00;
  }
  30% {
    background-color: #ff2600;
  }
  40% {
    background-color: #007bff;
  }
  50% {
    background-color: #2fdc51;
  }
  60% {
    background-color: #007bff;
  }
  70% {
    background-color: #ffdf00;
  }
  80% {
    background-color: #ff2600;
  }
  90% {
    background-color: #ffdf00;
  }
  100% {
    background-color: #007bff;
  }
}

  
@font-face {
    font-family: 'Cooper Black';
    src: url('COOPBL.TTF') format('truetype'); /* Chrome 4+, Firefox 3.5, Opera 10+, Safari 3—5 */
}  
/* default light theme */
:root, html{
  margin: 0;
  padding: 10;
  font-family: "Cooper Black";

  --main-color: #fefefe;
  --secondary-color: #888888;
  --third-color: #0F0F0F;

}

/* dark-mode theme */
:root[data-theme="dark-mode"]{
  

}
header{
    font-family: "Cooper Black";
    color: #312c24
}

/* main styles */
html, body{
  height: 200%;
  margin: 0;
  padding: 0;

}

body{
  position: relative;
  display: flex;
  justify-content: center;
  align-items: start;
}

*{
  box-sizing: border-box;
  font-family: "Cooper Black";
  font-size: 2rem;
  color: #ffdf00;
  transition: all 0.5s ease-in-out;
}


main{
  display: flex;
  justify-content: center;
  align-items: start;
}

.button{

  margin: 2rem;

  display: flex;
  justify-content: center;
  align-items: center;

  background-color: var(--main-color);
  border: 1px solid var(--secondary-color);
  border-radius: 5px;
  font-size: 0.75rem;
  padding: 0.25rem 1rem;


}

.neumorphic-shadows {
  -webkit-box-shadow: 3px 3px 6px var(--third-color), -3px -3px 6px #ffffff;
        box-shadow: 3px 3px 6px var(--third-color), -3px -3px 6px #ffffff;
}

.neumorphic-shadows:hover {
  cursor: pointer;
  -webkit-box-shadow: inset 2px 2px 5px var(--third-color), inset -3px -3px 7px #ffffff;
        box-shadow: inset 2px 2px 5px var(--third-color), inset -3px -3px 7px #ffffff;
}
</style>
